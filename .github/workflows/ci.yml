name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggers

env:
  PIXI_VERSION: v0.55.0

jobs:
  test-linux:
    name: Test on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          cache-write:
            ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: llmaven

      - name: Verify pixi installation
        run: |
          pixi --version
          pixi info

      - name: Install dependencies
        run: pixi install -e llmaven

      - name: Set up Docker
        run: |
          docker info
          docker ps

      - name: Run core tests
        run: |
          pixi run -e llmaven pytest tests/ \
            --verbose \
            --tb=short \
            --color=yes \
            --ignore=tests/agentic/ \
            --ignore=tests/v1/ \
            || echo "Core tests completed with status: $?"

      - name: Run agentic tests (excluding CLI integration tests)
        run: |
          pixi run -e llmaven pytest tests/agentic/ \
            --verbose \
            --tb=short \
            --color=yes \
            --ignore=tests/agentic/test_cli.py

      - name: Run API endpoint tests
        run: |
          pixi run -e llmaven pytest tests/v1/ \
            --verbose \
            --tb=short \
            --color=yes

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results - Ubuntu" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment" >> $GITHUB_STEP_SUMMARY
          echo "- OS: ubuntu-latest" >> $GITHUB_STEP_SUMMARY
          echo "- Pixi version: ${{ env.PIXI_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Python: $(pixi run -e llmaven python --version)" >> $GITHUB_STEP_SUMMARY
          echo "- Qdrant: Testcontainer (dynamic port)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          cache-write:
            ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: llmaven

      - name: Verify pixi installation
        run: |
          pixi --version
          pixi info

      - name: Install dependencies
        run: pixi install -e llmaven

      - name: Set up Docker
        run: |
          docker info
          docker ps

      - name: Run core tests
        run: |
          pixi run -e llmaven pytest tests/ \
            --verbose \
            --tb=short \
            --color=yes \
            --ignore=tests/agentic/ \
            --ignore=tests/v1/ \
            || echo "Core tests completed with status: $?"

      - name: Run agentic tests (excluding CLI integration tests)
        run: |
          pixi run -e llmaven pytest tests/agentic/ \
            --verbose \
            --tb=short \
            --color=yes \
            --ignore=tests/agentic/test_cli.py

      - name: Run API endpoint tests
        run: |
          pixi run -e llmaven pytest tests/v1/ \
            --verbose \
            --tb=short \
            --color=yes

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results - macOS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Environment" >> $GITHUB_STEP_SUMMARY
          echo "- OS: macos-latest" >> $GITHUB_STEP_SUMMARY
          echo "- Pixi version: ${{ env.PIXI_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Python: $(pixi run -e llmaven python --version)" >> $GITHUB_STEP_SUMMARY
          echo "- Qdrant: Testcontainer (dynamic port)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
          cache: true
          environments: llmaven

      - name: Install dependencies
        run: pixi install -e llmaven

      - name: Run pre-commit hooks
        run: |
          pixi run -e llmaven pre-commit run --all-files --show-diff-on-failure

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test-linux, test-macos, pre-commit]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Linux Tests: ${{ needs.test-linux.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- macOS Tests: ${{ needs.test-macos.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Pre-commit Hooks: ${{ needs.pre-commit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test-linux.result }}" == "success" ] && \
             [ "${{ needs.test-macos.result }}" == "success" ] && \
             [ "${{ needs.pre-commit.result }}" == "success" ]; then
            echo "✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some checks failed or were skipped" >> $GITHUB_STEP_SUMMARY
          fi
