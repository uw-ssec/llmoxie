#     s3_path: os.environ/S3_PATH_PREFIX

# General settings
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_prompts_in_spend_logs: true
  store_model_in_db: true

environment_variables:
  UI_LOGO_PATH: "https://rse-guidelines.readthedocs.io/en/latest/assets/images/logo.png"
  DOCS_TITLE: "UW SSEC AI Gateway"
  DOCS_DESCRIPTION:
    "University of Washington Scientific Software Engineering Center AI Gateway
    powered by LiteLLM"
